name: Repository Health Report

# ✋ Manually triggered — great for on-demand repository maintenance
on:
  workflow_dispatch:

jobs:
  generate-report:
    name: Generate Repository Health Report
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required to push changes
      pull-requests: write  # Required to create a PR

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Health Report Script
        run: |
          chmod +x actions/repo_health_report.sh
          ./actions/repo_health_report.sh

      - name: Create Pull Request with Report
        # 📖 Docs: https://github.com/peter-evans/create-pull-request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add repository health report (${{ github.run_id }})"
          branch: maintenance/health-report-${{ github.run_id }}
          title: "🏥 Repository Health Report — Automated"
          body: |
            ## 🤖 Automated Maintenance Report

            This PR was automatically generated by the **Repository Health Report** workflow.

            ### What's included:
            - A new entry has been appended to `MAINTENANCE_LOG.md` with a health
              check of this repository, including:
              - Key file presence (README, LICENSE, etc.)
              - Number of workflow files detected
              - Recent commit activity summary

            ### Next Steps:
            - Review the report in `MAINTENANCE_LOG.md`
            - Address any flagged missing files ❌
            - Close or merge this PR once reviewed

            > 🔁 Triggered manually via `workflow_dispatch` by @${{ github.actor }}
          labels: |
            maintenance
            automated
          draft: false
      - name: Auto approve the pull request
        uses: hmarr/auto-approve-action@v4
